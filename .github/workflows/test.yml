name: Test

on:
  push:
    paths: ["crates/**", "tests/**", "Cargo.toml", "Cargo.lock", ".github/workflows/**"]
  pull_request:
    paths: ["crates/**", "tests/**", "Cargo.toml", "Cargo.lock", ".github/workflows/**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache ssserver binary
        id: cache-ssserver
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/ssserver
          key: ssserver-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}

      - name: Install ssserver
        if: steps.cache-ssserver.outputs.cache-hit != 'true'
        run: cargo install shadowsocks-rust --features "stream-cipher aead-cipher-2022" --locked

      - name: Install simple-obfs (obfs-local / obfs-server)
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends simple-obfs
          # Fail fast if either binary is missing — the obfs integration tests
          # rely on both being on PATH (otherwise they would silently SKIP).
          command -v obfs-local
          command -v obfs-server

      - name: Build
        run: cargo build --tests

      - name: Unit tests
        run: cargo test --lib

      - name: Common types tests
        run: cargo test --test common_test -- --nocapture

      - name: DNS cache tests
        run: cargo test --test dns_cache_test -- --nocapture

      - name: Config parsing tests
        run: cargo test --test config_test -- --nocapture

      - name: Statistics tests
        run: cargo test --test statistics_test -- --nocapture

      - name: Rules tests
        run: cargo test --test rules_test -- --nocapture

      - name: Shadowsocks integration tests (incl. simple-obfs)
        env:
          # Force-fail (instead of silently SKIP) if ssserver / obfs-local /
          # obfs-server are missing on PATH — they are installed above.
          MIHOMO_REQUIRE_INTEGRATION_BINS: "1"
        run: cargo test --test shadowsocks_integration -- --nocapture

      - name: API integration tests
        run: cargo test --test api_test -- --nocapture

      - name: Config persistence tests
        run: cargo test --test config_persistence_test -- --nocapture

      - name: Systemd config tests
        run: cargo test -p mihomo-app --test systemd_config_test -- --nocapture

      - name: Trojan integration tests
        run: cargo test --test trojan_integration -- --nocapture

      - name: v2ray-plugin integration tests
        run: cargo test --test v2ray_plugin_integration -- --nocapture

      - name: DNS pre-resolve tests
        run: cargo test --test pre_resolve_test -- --nocapture

  msrv:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Read MSRV from workspace Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$msrv" >> "$GITHUB_OUTPUT"
          echo "MSRV: $msrv"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: msrv-${{ steps.msrv.outputs.version }}

      - name: Cargo check on MSRV toolchain
        run: cargo check --workspace --all-targets

  macos:
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: macos

      - name: Build
        run: cargo build --tests

      - name: Unit tests
        run: cargo test --lib

      - name: Common types tests
        run: cargo test --test common_test -- --nocapture

      - name: DNS cache tests
        run: cargo test --test dns_cache_test -- --nocapture

      - name: Config parsing tests
        run: cargo test --test config_test -- --nocapture

      - name: Config persistence tests
        run: cargo test --test config_persistence_test -- --nocapture

      - name: Statistics tests
        run: cargo test --test statistics_test -- --nocapture

      - name: Rules tests
        run: cargo test --test rules_test -- --nocapture

      - name: API integration tests
        run: cargo test --test api_test -- --nocapture

      - name: Trojan integration tests
        run: cargo test --test trojan_integration -- --nocapture

      - name: v2ray-plugin integration tests
        run: cargo test --test v2ray_plugin_integration -- --nocapture

      - name: DNS pre-resolve tests
        run: cargo test --test pre_resolve_test -- --nocapture

  tproxy:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: TProxy integration tests
        run: bash tests/test_tproxy_qemu.sh
